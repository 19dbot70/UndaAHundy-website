<?xml version="1.0" encoding="UTF-8"?>
<!-- UAH header mark — white U / underscore / 99 on transparent.
     Matches the U/99 mark from the full brand lockup (public/hero-logo.jpg)
     but at header size. Transparent bg so it sits on the page's black bg cleanly. -->
<svg xmlns="http://www.w3.org/2000/svg" width="60" height="40" viewBox="0 0 60 40">
  <!-- Big white U (serif-style top + bottom serifs, matches the lockup) -->
  <text x="30" y="22"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26"
        font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle">U</text>
  <!-- White underscore line -->
  <line x1="18" y1="27" x2="42" y2="27" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- White 99 below the underscore -->
  <text x="30" y="38"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11"
        font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle">99</text>
</svg>